  <line x1="24" y1="258" x2="476" y2="258" stroke="#eeeeee" stroke-width="1"/>
  <text x="24" y="280" font-size="13" fill="#111111"><tspan fill="#555555">Skład: </tspan><tspan font-weight="700">MLEKO</tspan> krowie, sól, kultury bakteryjne, podpuszczka.</text>
  <text x="24" y="300" font-size="13" fill="#111111"><tspan fill="#555555">Alergeny: </tspan><tspan font-weight="700">MLEKO</tspan></text>
