<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350" font-family="Arial, Helvetica, sans-serif" role="img" aria-label="Wzór etykiety RHD na ser dojrzewający (gouda) z polami obowiązkowymi">
  <rect x="2" y="2" width="496" height="346" fill="#ffffff" stroke="#333333" stroke-width="2"/>
