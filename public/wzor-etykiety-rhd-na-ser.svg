  <text x="476" y="40" font-size="21" font-weight="700" fill="#111111" text-anchor="end">0,4 kg</text>
  <text x="24" y="58" font-size="12" fill="#444444" letter-spacing="0.6">ROLNICZY HANDEL DETALICZNY</text>
  <line x1="24" y1="70" x2="476" y2="70" stroke="#cccccc" stroke-width="1"/>
  <!-- Wiersze danych -->
