    <text x="24" y="198" fill="#555555">Przechowywanie</text><text x="205" y="198">Przechowywać w temp. 4–10°C</text>
    <text x="24" y="220" fill="#555555">Nr partii</text><text x="205" y="220">GOUDA-20260622-A</text>
